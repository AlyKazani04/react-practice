<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
          font-family: system-ui, -apple-system, sans-serif;
          background-color: #f3f4f6;
          color: #1f2937;
          max-width: 800px;
          margin: 40px auto;
          padding: 20px;
      }
      h1 { color: #111827; margin-bottom: 8px; }
      .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
          gap: 20px;
          margin-top: 24px;
      }
      .card {
          background: white;
          padding: 20px;
          border-radius: 8px;
          box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
          text-decoration: none;
          color: inherit;
          transition: transform 0.2s, box-shadow 0.2s;
      }
      .card:hover {
          transform: translateY(-4px);
          box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      }
      .card h3 { margin: 0 0 8px 0; color: #2563eb; }
      .card p { margin: 0; color: #4b5563; font-size: 0.95rem; }
    </style>
    <title>React Projects</title>
  </head>
  <body>
    <h1>React Projects</h1>

    <div class="grid">
        <!-- Visual Anchor: Your active Movie Finder link -->
        <a href="./movie-finder/" class="card">
            <h3>Movie Finder</h3>
            <p>Browse trending films, scour the movie database for your next watch.</p>
        </a>

        <!-- Template Card: Copy this block whenever you deploy a new sub-project later -->
        <!-- 
        <a href="./weather-app/" class="card">
            <h3>☀️ Weather App</h3>
            <p>Real-time weather tracking and forecasts by city.</p>
        </a> 
        -->
    </div>
  </body>
</html>
