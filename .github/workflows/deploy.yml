name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main 

permissions:
  contents: write 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_NEON_DATABASE_AUTH_URL: ${{ secrets.VITE_NEON_DATABASE_AUTH_URL }}
          VITE_NEON_DATABASE_API_URL: ${{ secrets.VITE_NEON_DATABASE_API_URL }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
